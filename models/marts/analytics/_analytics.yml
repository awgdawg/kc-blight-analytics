version: 2

models:
  - name: mart_blight_funnel
    columns:
      - name: stage_order
        tests: [unique, not_null]
  - name: mart_council_district
    columns:
      - name: council_district
        tests: [not_null]
  - name: mart_top_violation_types
    columns:
      - name: violation_code
        tests: [not_null]
  - name: mart_property_points
    columns:
      - name: pin
        tests: [unique, not_null]
      - name: lat_lng
        tests: [not_null]
  - name: mart_dashboard
    columns:
      - name: violation_pk
        tests: [unique, not_null]   # proves the wide joins didn't fan out
      - name: council_district
        tests: [not_null]
