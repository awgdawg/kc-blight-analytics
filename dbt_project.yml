name: 'kc_blight'
version: '1.0.0'
config-version: 2

profile: 'kc_blight'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  kc_blight:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      dimensions:
        +materialized: table
        +schema: dims
      facts:
        +materialized: table
        +schema: facts
      analytics:
        +materialized: table
        +schema: marts

seeds:
  kc_blight:
    +schema: staging

vars:
  raw_dataset: 'kc_blight_raw'
